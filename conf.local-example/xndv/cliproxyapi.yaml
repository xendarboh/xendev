# CLIProxyAPI — OAuth adapter for login-based LLM providers
# Used by LiteLLM gateway to route through login-based provider accounts
#
# Login:  make gateway-login PROVIDER=claude
# Docs:   https://github.com/router-for-me/CLIProxyAPI

host: ""
port: 8317
auth-dir: /root/.cli-proxy-api

# Internal key — only LiteLLM calls CLIProxyAPI (not exposed to clients)
# Must match api_key in litellm.yaml OAuth deployments
api-keys:
  - "sk-cliproxy"

routing:
  strategy: round-robin

request-retry: 3
debug: false

remote-management:
  allow-remote: false # keep false — localhost only (safe)
