services:
  # ─── BUILD-ONLY
  xen-x11:
    profiles: [build]
    build:
      context: ./
      dockerfile: Dockerfile.x11
      args:
        - IMAGE_BASE=${IMAGE_BASE}
        - INSTALL_BROWSER_BRAVE
        - INSTALL_BROWSER_CHROMIUM
    image: xen/x11

  xen-sys:
    profiles: [build]
    build:
      context: ./
      dockerfile: Dockerfile.sys
    image: xen/sys

  xen-dev:
    profiles: [build]
    build:
      context: ./
      args:
        - IMAGE_BASE
        - INSTALL_AIDER
        - INSTALL_BROWSER_BRAVE
        - INSTALL_BROWSER_CHROMIUM
        - INSTALL_CIRCOM
        - INSTALL_CLAUDECODE
        - INSTALL_CYPRESS_DEPS
        - INSTALL_DEVOPS
        - INSTALL_DOCS
        - INSTALL_LLVM
        - INSTALL_NEOVIM_FROM_PPA_STABLE
        - INSTALL_NEOVIM_FROM_PPA_UNSTABLE
        - INSTALL_NEOVIM_FROM_SRC
        - INSTALL_NIX
        - INSTALL_NOIR
        - INSTALL_OPENCODE
        - INSTALL_PB
        - INSTALL_PLATFORMIO
        - INSTALL_TAURI
        - INSTALL_TOMB
        - OPTIONS_NVIM_APPNAME
        - OPTIONS_OHMYOPENCODE
        - OPTIONS_THEME
        - VERSION_FISH
        - VERSION_KPCLI
        - VERSION_LLVM
        - VERSION_NEOVIM_FROM_SRC
        - VERSION_NODE
        - VERSION_OHMYOPENCODE
        - VERSION_TOMB
    image: xen/dev

  # ─── RUNTIME: LOCAL AI MODELS
  # Optional local model runner stack (Docker Model Runner + Open WebUI)
  # Configure via MODELS_* vars in .env — see .env-example
  open-webui:
    profiles: [models]
    image: ghcr.io/open-webui/open-webui:main
    container_name: xendev-open-webui
    ports:
      - ${MODELS_WEBUI_PORT:-12444}:8080
    environment:
      - GUNICORN_TIMEOUT=300
      - WEBUI_AUTH=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.local/share/xendev/xndv-ai/open-webui:/app/backend/data
    models:
      - llm-primary

  # ─── RUNTIME: MCP SERVERS
  # Add local MCP server services here with profiles: [mcp]

# ─── DOCKER MODEL RUNNER
# Top-level `models:` is not affected by profiles — always active.
# Requires Docker Compose v2.38+ with Docker Model Runner enabled.
models:
  llm-primary:
    model: ${MODELS_PRIMARY}
