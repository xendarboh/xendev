services:
  # ─── BUILD-ONLY
  xen-x11:
    profiles: [build]
    build:
      context: ./
      dockerfile: Dockerfile.x11
      args:
        - IMAGE_BASE=${IMAGE_BASE}
        - INSTALL_BROWSER_BRAVE
        - INSTALL_BROWSER_CHROMIUM
    image: xen/x11

  xen-sys:
    profiles: [build]
    build:
      context: ./
      dockerfile: Dockerfile.sys
    image: xen/sys

  xen-dev:
    profiles: [build]
    build:
      context: ./
      args:
        - IMAGE_BASE
        - INSTALL_AIDER
        - INSTALL_BROWSER_BRAVE
        - INSTALL_BROWSER_CHROMIUM
        - INSTALL_CIRCOM
        - INSTALL_CLAUDECODE
        - INSTALL_CYPRESS_DEPS
        - INSTALL_DEVOPS
        - INSTALL_DOCS
        - INSTALL_LLVM
        - INSTALL_NEOVIM_FROM_PPA_STABLE
        - INSTALL_NEOVIM_FROM_PPA_UNSTABLE
        - INSTALL_NEOVIM_FROM_SRC
        - INSTALL_NIX
        - INSTALL_NOIR
        - INSTALL_OPENCODE
        - INSTALL_PB
        - INSTALL_PLATFORMIO
        - INSTALL_TAURI
        - INSTALL_TOMB
        - OPTIONS_NVIM_APPNAME
        - OPTIONS_OHMYOPENCODE
        - OPTIONS_THEME
        - VERSION_FISH
        - VERSION_KPCLI
        - VERSION_LLVM
        - VERSION_NEOVIM_FROM_SRC
        - VERSION_NODE
        - VERSION_OHMYOPENCODE
        - VERSION_TOMB
    image: xen/dev

  # ─── RUNTIME: LOCAL AI MODELS
  # Optional local model runner stack (Docker Model Runner + Open WebUI)
  # Configure via MODELS_* vars in .env — see .env-example
  open-webui:
    profiles: [models]
    image: ghcr.io/open-webui/open-webui:main
    container_name: xendev-open-webui
    ports:
      - ${MODELS_WEBUI_PORT:-12444}:8080
    environment:
      - GUNICORN_TIMEOUT=300
      - WEBUI_AUTH=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.local/share/xendev/xndv-ai/open-webui:/app/backend/data
    models:
      - llm-primary

  # ─── RUNTIME: LLM GATEWAY
  # LiteLLM unified proxy for all LLM providers — observability, caching, fallback routing
  # Configure via GATEWAY_* vars in .env — see .env-example
  # Edit conf.local/xendev/litellm.yaml to set providers and API keys
  gateway:
    profiles: [gateway]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: xendev-gateway
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - ${GATEWAY_PROXY_PORT:-4000}:4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - API_KEY_ANTHROPIC=${GATEWAY_API_KEY_ANTHROPIC:-}
      - API_KEY_GOOGLE=${GATEWAY_API_KEY_GOOGLE:-}
      - API_KEY_OPENAI=${GATEWAY_API_KEY_OPENAI:-}
      - API_KEY_OPENCODE_ZEN=${GATEWAY_API_KEY_OPENCODE_ZEN:-}
      - DMR_MODEL=openai/${MODELS_PRIMARY}
      - DATABASE_URL=postgresql://litellm:litellm@gateway-db:5432/litellm
      - LITELLM_MASTER_KEY=${GATEWAY_MASTER_KEY:-}
      - REDIS_HOST=gateway-redis
      - REDIS_PORT=6379
    volumes:
      - ./conf.local/xendev/litellm.yaml:/app/config.yaml:ro
    depends_on:
      gateway-db:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy

  gateway-db:
    profiles: [gateway]
    image: postgres:16-alpine
    container_name: xendev-gateway-db
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_PASSWORD=litellm
      - POSTGRES_USER=litellm
    volumes:
      - ${HOME}/.local/share/xendev/xndv-ai/gateway/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway-redis:
    profiles: [gateway]
    image: redis:7-alpine
    container_name: xendev-gateway-redis
    volumes:
      - ${HOME}/.local/share/xendev/xndv-ai/gateway/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # CLIProxyAPI — OAuth adapter for login-based LLM providers
  # Login: make gateway-login PROVIDER=claude
  gateway-oauth:
    profiles: [gateway]
    image: eceasy/cli-proxy-api-plus:latest
    container_name: xendev-gateway-oauth
    ports:
      - ${GATEWAY_OAUTH_PORT:-8317}:8317
    volumes:
      - ./conf.local/xendev/cliproxyapi.yaml:/CLIProxyAPI/config.yaml:ro
      - ${HOME}/.local/share/xendev/xndv-ai/gateway/cliproxyapi-auth:/root/.cli-proxy-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8317/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── RUNTIME: MCP SERVERS
  # Add local MCP server services here with profiles: [mcp]

# ─── DOCKER MODEL RUNNER
# Top-level `models:` is not affected by profiles — always active.
# Requires Docker Compose v2.38+ with Docker Model Runner enabled.
models:
  llm-primary:
    model: ${MODELS_PRIMARY}
